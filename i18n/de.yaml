agent:
  name: Wetter-Assistent
  description: Wettervorhersage-Agent für Selu mit Live-Daten von Open-Meteo.
  long_description: Dieser Agent liefert aktuelle Bedingungen und eine 7-Tage-Vorhersage für Orte auf der ganzen Welt.

capabilities:
  weather-api:
    tools:
      get_forecast:
        display_name: Wetter abrufen
        description: Rufe das aktuelle Wetter und eine 7-Tage-Vorhersage für einen Ort ab.

approval:
  tools:
    weather-api__get_forecast:
      label: Wetter abrufen
      message: Ich möchte die aktuelle Wettervorhersage für dich abrufen.
