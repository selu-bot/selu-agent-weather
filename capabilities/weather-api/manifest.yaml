id: weather-api
class: tool
image: selu-cap-weather-api:latest

tools:
  - name: get_forecast
    description: >
      Get the current weather and a 7-day forecast for a location.
      Accepts either a city name (geocoded automatically) or explicit
      latitude/longitude coordinates.
    input_schema:
      type: object
      properties:
        city:
          type: string
          description: "City name to look up (e.g. 'Berlin', 'New York'). Either city or lat/lon must be provided."
        latitude:
          type: number
          description: "Latitude in decimal degrees. Use together with longitude."
        longitude:
          type: number
          description: "Longitude in decimal degrees. Use together with latitude."
      required: []
    recommended_policy: allow

network:
  mode: allowlist
  hosts:
    - "api.open-meteo.com:443"
    - "geocoding-api.open-meteo.com:443"

filesystem: temp

credentials: []

resources:
  max_memory_mb: 64
  max_cpu_fraction: 0.25
  max_cpu_seconds: 15
  pids_limit: 32

sharing:
  mode: shared
  max_concurrent: 4
  idle_timeout_seconds: 300
